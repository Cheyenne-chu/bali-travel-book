<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bali Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
  body { background-color: #F6F5F0; font-family: 'Noto Sans TC', sans-serif; color: #4A453F; margin: 0; padding: 20px; display: flex; justify-content: center; }
  .app-container { width: 100%; max-width: 414px; }
  .user-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .u-tab { flex: 1; text-align: center; padding: 10px; background: #FFF; border-radius: 12px; cursor: pointer; border: 1px solid #E0DDD6; font-size: 13px; }
  .u-tab.active { background: #D4A373; color: white; border-color: #D4A373; }
  .category-box { margin-bottom: 20px; }
  .cat-title { font-size: 14px; font-weight: 700; color: #6B4D32; margin-bottom: 10px; border-bottom: 2px solid #D4A373; padding-bottom: 5px; }
  .item-row { display: flex; align-items: center; background: #FFF; padding: 12px; border-radius: 10px; margin-bottom: 8px; }
  .del-btn { color: #D67D7D; cursor: pointer; margin-right: 10px; font-size: 12px; }
  .checkbox { width: 20px; height: 20px; border: 2px solid #D4A373; border-radius: 5px; margin-left: auto; cursor: pointer; }
  .checkbox.checked { background: #D4A373; }
  .add-input { width: 100%; padding: 12px; margin-top: 20px; border-radius: 10px; border: 1px solid #E0DDD6; box-sizing: border-box; }
</style>
</head>
<body>

<div class="app-container">
  <div class="user-tabs">
    <div class="u-tab active" onclick="switchUser('zt', this)">🧸 芷葶</div>
    <div class="u-tab" onclick="switchUser('jj', this)">🦁 嘉嘉</div>
    <div class="u-tab" onclick="switchUser('ll', this)">🐶 倫倫</div>
  </div>

  <div id="list-container"></div>
  <input type="text" id="new-item" class="add-input" placeholder="新增物品 (輸入後按 Enter)">
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const db = getFirestore(initializeApp({ /* 你的設定 */ }));
  
  // 定義預設結構
  let dataState = {
    "隨身行李": ["護照", "行動電源", "美金", "信用卡"],
    "拖運行李": ["牙刷", "泳衣", "充電線", "摺疊傘"]
  };
  let currentUser = 'zt';

  function render(serverData = {}) {
    const container = document.getElementById('list-container');
    container.innerHTML = '';

    Object.keys(dataState).forEach(cat => {
      // 倫倫邏輯：不顯示拖運
      if (currentUser === 'll' && cat === '拖運行李') return;

      container.innerHTML += `<div class="cat-title">${cat}</div>`;
      dataState[cat].forEach(item => {
        const isChecked = serverData[`${item}_${currentUser}`];
        container.innerHTML += `
          <div class="item-row">
            <span class="del-btn" onclick="removeItem('${cat}', '${item}')">✕</span>
            <div>${item}</div>
            <div class="checkbox ${isChecked ? 'checked' : ''}" onclick="toggle('${item}')"></div>
          </div>`;
      });
    });
  }

  // 新增物品邏輯
  document.getElementById('new-item').onkeypress = (e) => {
    if (e.key === 'Enter') {
      const name = e.target.value;
      const cat = prompt("請選擇類別: 隨身行李 或 拖運行李");
      if (dataState[cat]) {
        dataState[cat].push(name);
        render(); // 這裡可以進一步呼叫 updateDoc 更新 Firebase
        e.target.value = '';
      } else {
        alert("分類輸入錯誤！");
      }
    }
  };

  window.switchUser = (u, el) => {
    currentUser = u;
    document.querySelectorAll('.u-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    render();
  };

  render();
</script>
</body>
</html>
