<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bali Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* 基礎設定延續燕麥奶高質感風格 */
  body {
    background-color: #F6F5F0; 
    font-family: 'Noto Sans TC', sans-serif;
    color: #4A453F; 
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
  }
  
  .app-container {
    width: 100%;
    max-width: 414px; 
    min-height: 100vh;
    padding: 24px 20px 80px 20px; /* 底部多留白給懸浮按鈕 */
    box-sizing: border-box;
    position: relative;
  }

  /* 頂部 Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  
  .header-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px;
    letter-spacing: 2px;
    font-weight: 700;
  }

  /* 導覽列 */
  .nav-tabs {
    display: flex;
    justify-content: space-between;
    margin-bottom: 32px;
    padding: 0 4px;
    font-size: 14px;
  }
  
  .nav-tab {
    color: #B0ADA7; 
    font-weight: 500;
    transition: color 0.2s ease;
  }
  
  .nav-tab.active {
    color: #4A453F;
    font-weight: 700;
  }

  /* 準備進度大字 */
  .progress-section {
    text-align: center;
    margin-bottom: 32px;
  }

  .progress-number {
    font-family: 'Noto Serif TC', serif;
    font-size: 80px;
    font-weight: 700;
    color: #4A453F;
    line-height: 1;
    display: flex;
    justify-content: center;
    align-items: flex-end;
  }

  .progress-percent {
    font-size: 32px;
    margin-bottom: 12px;
    margin-left: 4px;
  }

  .progress-label {
    font-size: 12px;
    color: #8C8882;
    margin-top: 16px;
    position: relative;
    display: inline-block;
  }

  /* 準備進度下方的底線 */
  .progress-label::before {
    content: '';
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 2px;
    background-color: #4A453F;
  }

  /* 兩人分頁切換 */
  .user-tabs {
    display: flex;
    background-color: #EFECE6; /* 更深的灰底凸顯白色按鈕 */
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 32px;
  }

  .user-tab {
    flex: 1;
    text-align: center;
    padding: 12px 0;
    font-size: 14px;
    color: #B0ADA7;
    border-radius: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }

  .user-tab.active {
    background-color: #FFFFFF;
    color: #4A453F;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  /* 清單群組與標題 */
  .checklist-group {
    margin-bottom: 24px;
  }

  .group-title {
    font-size: 13px;
    font-weight: 700;
    color: #6B4D32;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding-left: 4px;
  }

  /* 獨立清單項目 (客製化 Checkbox) */
  .check-item {
    background-color: #FFFFFF;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    box-shadow: 0 4px 12px rgba(74, 69, 63, 0.03);
    cursor: pointer;
  }

  /* 隱藏原生 Checkbox */
  .check-item input[type="checkbox"] {
    display: none;
  }

  /* 假 Checkbox 外觀 */
  .custom-checkbox {
    width: 22px;
    height: 22px;
    border: 1.5px solid #E0DDD6;
    border-radius: 6px;
    margin-right: 16px;
    display: flex;
    justify-content: center;
    align-items: center;
    color: transparent; /* 預設隱藏打勾 */
    font-size: 14px;
    transition: all 0.2s ease;
  }

  /* 文字區塊 */
  .check-text-group {
    flex: 1;
  }

  .check-title {
    font-size: 15px;
    color: #4A453F;
    font-weight: 500;
    margin-bottom: 4px;
    transition: all 0.2s ease;
  }

  .check-sub {
    font-size: 11px;
    color: #D4A373; /* 黃橘色標示共同物品 */
  }

  .check-more {
    color: #E0DDD6;
    font-size: 20px;
    letter-spacing: 2px;
    padding-left: 12px;
  }

  /* --- 打勾後的狀態變化 --- */
  /* 當 input 被 checked 時，改變相鄰的假 checkbox 與文字樣式 */
  .check-item input[type="checkbox"]:checked + .custom-checkbox {
    background-color: #4A453F;
    border-color: #4A453F;
    color: #FFFFFF; /* 顯示打勾符號 */
  }

  .check-item input[type="checkbox"]:checked ~ .check-text-group .check-title {
    color: #B0ADA7;
    text-decoration: line-through; /* 加上刪除線 */
  }

  /* 懸浮新增按鈕 */
  .fab-button {
    position: fixed;
    bottom: 30px;
    right: 20px;
    width: 56px;
    height: 56px;
    background-color: #4A453F;
    color: #FFFFFF;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    box-shadow: 0 8px 24px rgba(74, 69, 63, 0.2);
    cursor: pointer;
    border: none;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <div class="header-title">🌴 BALI</div>
    <div class="status-badge">✔ 已儲存</div>
  </div>

  <div class="nav-tabs">
    <a href="index.html" class="nav-tab" style="text-decoration: none;">首頁</a>
    <a href="itinerary.html" class="nav-tab" style="text-decoration: none;">行程</a>
    <a href="accounting.html" class="nav-tab" style="text-decoration: none;">記帳</a>
    <a href="checklist.html" class="nav-tab active" style="text-decoration: none;">清單</a>
  </div>

  <div class="progress-section">
    <div class="progress-number">
      69<span class="progress-percent">%</span>
    </div>
    <div class="progress-label">準備進度</div>
  </div>

  <div class="user-tabs">
    <div class="user-tab active">
      <span style="font-size: 16px;">👤</span> Cheyenne
    </div>
    <div class="user-tab">
      <span style="font-size: 16px;">👤</span> 伴侶
    </div>
  </div>

  <div class="checklist-group">
    <div class="group-title">🪪 證件與錢包</div>
    
    <label class="check-item">
      <input type="checkbox" checked>
      <div class="custom-checkbox">✔</div>
      <div class="check-text-group">
        <div class="check-title">護照 (效期6個月以上)</div>
        <div class="check-sub">共同物品</div>
      </div>
      <div class="check-more">⋮</div>
    </label>

    <label class="check-item">
      <input type="checkbox">
      <div class="custom-checkbox">✔</div>
      <div class="check-text-group">
        <div class="check-title">國際駕照 + 台灣駕照</div>
        <div class="check-sub">共同物品</div>
      </div>
      <div class="check-more">⋮</div>
    </label>

    <label class="check-item">
      <input type="checkbox" checked>
      <div class="custom-checkbox">✔</div>
      <div class="check-text-group">
        <div class="check-title">信用卡 (海外回饋高)</div>
        <div class="check-sub">共同物品</div>
      </div>
      <div class="check-more">⋮</div>
    </label>

    <label class="check-item">
      <input type="checkbox" checked>
      <div class="custom-checkbox">✔</div>
      <div class="check-text-group">
        <div class="check-title">印尼盾 / 美金現金</div>
        <div class="check-sub">共同物品</div>
      </div>
      <div class="check-more">⋮</div>
    </label>
  </div>

  <div class="checklist-group">
    <div class="group-title">🔌 電子產品</div>
    <label class="check-item">
      <input type="checkbox">
      <div class="custom-checkbox">✔</div>
      <div class="check-text-group">
        <div class="check-title">萬國轉接頭 (雙圓孔)</div>
        <div class="check-sub">個人物品</div>
      </div>
      <div class="check-more">⋮</div>
    </label>
  </div>

  <button class="fab-button">+</button>

</div>

</body>
</html>
