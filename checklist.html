<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bali Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body { background-color: #F6F5F0; font-family: 'Noto Sans TC', sans-serif; color: #4A453F; margin: 0; padding: 20px; display: flex; justify-content: center; }
  .app-container { width: 100%; max-width: 414px; }
  
  /* 進度條 */
  .progress-card { background: #FFFFFF; padding: 20px; border-radius: 20px; margin-bottom: 20px; text-align: center; }
  .progress-bar { height: 10px; background: #EEE; border-radius: 5px; margin: 10px 0; overflow: hidden; }
  #progress-fill { height: 100%; background: #55B97F; width: 0%; transition: 0.5s; }

  /* 切換人員 */
  .user-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .u-tab { flex: 1; text-align: center; padding: 10px; background: #FFF; border-radius: 12px; cursor: pointer; border: 1px solid #E0DDD6; }
  .u-tab.active { background: #D4A373; color: #FFF; }

  /* 清單 */
  .category-title { font-size: 13px; font-weight: 700; color: #8C8882; margin: 20px 0 10px 5px; }
  .item-row { display: flex; align-items: center; background: #FFF; padding: 12px; border-radius: 12px; margin-bottom: 8px; }
  .item-name { flex: 1; font-size: 14px; }
  .del-btn { color: #D67D7D; margin-right: 15px; cursor: pointer; font-size: 12px; }
  .checkbox { width: 22px; height: 22px; border: 2px solid #E0DDD6; border-radius: 6px; cursor: pointer; }
  .checkbox.checked { background: #D4A373; border-color: #D4A373; }
  
  .add-area { display: flex; gap: 8px; margin-top: 20px; }
  input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #E0DDD6; }
</style>
</head>
<body>

<div class="app-container">
  <div class="progress-card">
    <div style="font-size: 13px;">目前完成進度</div>
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <div id="progress-text">0%</div>
  </div>

  <div class="user-tabs">
    <div class="u-tab active" onclick="switchUser('zt', this)">🧸 芷葶</div>
    <div class="u-tab" onclick="switchUser('jj', this)">🦁 嘉嘉</div>
    <div class="u-tab" onclick="switchUser('ll', this)">🐶 倫倫</div>
  </div>

  <div id="list-render"></div>

  <div class="add-area">
    <input type="text" id="new-item-name" placeholder="新增物品...">
    <button onclick="addItem()">+</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getFirestore, doc, onSnapshot, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const db = getFirestore(initializeApp({ /* 你的 firebaseConfig */ }));
  let currentUser = 'zt';
  let allItems = {
    "隨身行李": ["護照", "行動電源", "美金", "信用卡", "家裡鑰匙", "國際駕照", "e-sim (印尼)", "e-sim (新加玻)"],
    "拖運行李": ["牙刷/牙膏", "洗面乳", "卸妝乳", "洗臉巾", "洗髮乳", "沐浴乳", "乳液", "面膜", "泳衣", "手機充電線", "離子夾", "摺疊傘", "濾水器"]
  };

  function render() {
    const root = document.getElementById('list-render');
    root.innerHTML = '';
    
    Object.keys(allItems).forEach(cat => {
      if (currentUser === 'll' && cat === '拖運行李') return; // 倫倫邏輯
      
      root.innerHTML += `<div class="category-title">${cat}</div>`;
      allItems[cat].forEach(item => {
        root.innerHTML += `
          <div class="item-row">
            <span class="del-btn" onclick="removeItem('${cat}', '${item}')">刪除</span>
            <div class="item-name">${item}</div>
            <div class="checkbox" id="cb-${item}" onclick="toggle('${item}')"></div>
          </div>`;
      });
    });
  }

  window.toggle = async (item) => {
    // 這裡會更新 Firebase 中對應 user 的狀態... (省略細節)
  };

  window.switchUser = (u, el) => {
    currentUser = u;
    document.querySelectorAll('.u-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    render();
  };

  render();
</script>
</body>
</html>
