  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 0 20px; }

  .nav-tab { color: #B0ADA7; font-weight: 500; text-decoration: none; }
  .nav-tab.active { color: #4A453F; font-weight: 700; border-bottom: 2px solid #4A453F; padding-bottom: 2px; }

  /* 副選單 (底色區隔) */
  .date-tabs-wrapper { background-color: #EBE7DF; padding: 12px 0 0 0; }
  .date-tabs { display: flex; overflow-x: auto; padding: 0 24px; gap: 24px; scrollbar-width: none; }
  .date-tabs::-webkit-scrollbar { display: none; }
  .date-tab { font-family: 'Noto Serif TC', serif; font-size: 15px; color: #8C8882; white-space: nowrap; cursor: pointer; padding-bottom: 12px; position: relative; font-weight: 500; transition: 0.3s; }
  .date-tab.active { color: #6B4D32; font-weight: 700; }
  .date-tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background-color: #D4A373; border-radius: 3px 3px 0 0; }

  /* 置頂日期 Header */
  .sticky-date { position: sticky; top: 127px; background-color: #D67D7D; color: #FFFFFF; font-family: 'Noto Serif TC', serif; font-size: 16px; font-weight: 700; padding: 12px 24px; z-index: 980; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(214,125,125,0.2); }

  .timeline-marker.solid { background-color: #D4A373; }

  .event-card { background-color: #FFFFFF; border-radius: 16px; margin-left: 20px; flex-grow: 1; box-shadow: 0 8px 24px rgba(74, 69, 63, 0.03); overflow: hidden; border: 1px solid #F0EFEA; cursor: pointer; transition: 0.3s; }
  .event-card:active { background-color: #FAFAFA; }
  
  .event-summary { padding: 16px; position: relative; }
  .event-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .event-time { font-family: 'Noto Serif TC', serif; font-size: 14px; color: #B0ADA7; font-weight: 700; }
  .event-tag { font-size: 10px; padding: 4px 8px; border-radius: 12px; font-weight: 700; }
  .tag-flight { background-color: #E8F0FE; color: #5B7FA6; }
  .tag-spot { background-color: #FDF3E7; color: #D4A373; }
  .tag-food { background-color: #FDECEC; color: #D67D7D; }
  .tag-hotel { background-color: #F0F4F8; color: #7B9EBD; }

  .event-title { font-size: 16px; font-weight: 700; color: #4A453F; padding-right: 24px; margin-bottom: 4px; }
  .event-duration { font-size: 12px; color: #8C8882; display: flex; align-items: center; font-weight: 500; }
  
  .expand-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #D4A373; font-size: 18px; transition: 0.3s; }
  .event-card.open .expand-icon { transform: translateY(-50%) rotate(180deg); }

  /* 車程與憑證區塊 */
  .transit-row { display: flex; align-items: center; padding: 12px 0 12px 36px; position: relative; gap: 12px; }

  let currentDay = 1;

  function renderTabs() {
    const tabsContainer = document.getElementById('date-tabs-container');
    tabsContainer.innerHTML = '';
    
    for (let i = 1; i <= 7; i++) {
      const tabName = itineraryData[i] ? itineraryData[i].tabName : `Day ${i}`;
      const tab = document.createElement('div');
      tab.className = `date-tab ${i === currentDay ? 'active' : ''}`;
      tab.innerText = tabName;
      tab.onclick = () => {
        currentDay = i;
        renderTabs();
        renderTimeline();
      };
      tabsContainer.appendChild(tab);
    }
  }

  function renderTimeline() {

      stickyDate.innerText = dayData ? dayData.dateHeader : `Day ${currentDay}`;
      container.innerHTML = '<div style="text-align:center; padding: 40px; color:#B0ADA7; font-size: 14px;">此日行程規劃中... 🌴</div>';
      return;
    }

    stickyDate.innerText = dayData.dateHeader;

    dayData.events.forEach((event, index) => {
      const isSolid = index % 2 === 1 ? 'solid' : ''; 
      
      // 安全地組裝各個區塊，避免引號打架
      let durationHtml = event.duration ? `<div class="event-duration">${event.duration}</div>` : '';
      let imageHtml = event.image ? `<img src="${event.image}" class="detail-img">` : '';
      let hoursHtml = event.hours ? `<div class="info-row"><div class="info-icon">🕒</div><div class="info-text">${event.hours}</div></div>` : '';
      let priceHtml = event.price ? `<div class="info-row"><div class="info-icon">💰</div><div class="info-text">${event.price}</div></div>` : '';
      
      let addressHtml = '';
      if (event.address) {
        let linkHtml = event.mapUrl ? `<a href="${event.mapUrl}" target="_blank" class="map-link">${event.address}</a>` : event.address;
        addressHtml = `<div class="info-row"><div class="info-icon">📍</div><div class="info-text">${linkHtml}</div></div>`;
      }

      let notesHtml = event.notes ? `<div class="detail-notes"><div class="notes-title">💡 注意事項：</div><div class="notes-content">${event.notes}</div></div>` : '';

      // 卡片主體
      let cardHtml = `
        <div class="timeline-item">
          <div class="timeline-marker ${isSolid}"></div>
          <div class="event-card" onclick="this.classList.toggle('open')">
            <div class="event-summary">
              <div class="event-header">
                <span class="event-time">${event.time}</span>
                <span class="event-tag ${event.tagClass}">${event.tagText}</span>
              </div>
              <div class="event-title">${event.title}</div>
              ${durationHtml}
              <div class="expand-icon">▼</div>
            </div>
            
            <div class="event-details">
              ${imageHtml}
              <div class="info-grid">
                ${hoursHtml}
                ${priceHtml}
                ${addressHtml}
              </div>
              ${notesHtml}
            </div>
          </div>
        </div>
      `;

      // 車程連結段落
      let transitHtml = '';
      if (event.transit) {
        const icon = event.transit.mode === 'car' ? '🚗' : '🛵';
        const docHtml = event.transit.docUrl ? `<a href="${event.transit.docUrl}" target="_blank" class="transit-doc">📄 ${event.transit.docName}</a>` : '';
        transitHtml = `
          <div class="transit-row">
            <div class="transit-icon">${icon}</div>
            <div class="transit-time">${event.transit.time}</div>
            ${docHtml}
          </div>
        `;
      } else if (index < dayData.events.length - 1) {
        transitHtml = `<div style="height: 24px;"></div>`;
      }

      container.innerHTML += (cardHtml + transitHtml);
    });
  }

  renderTabs();
  renderTimeline();
</script>
</body>
</html>
